name: Build ImmortalWrt

on:
  repository_dispatch:
  workflow_dispatch:
    inputs:
      ssh:
        description: 'SSH connection to Actions'
        required: false
        default: false
        type: boolean
      nocache:
        description: 'Clean Building Cache'
        required: false
        default: false
        type: boolean
      repo:
        description: 'Repo URL'
        required: false
        default: https://github.com/immortalwrt/immortalwrt
      branch:
        description: 'Repo Branch'
        required: false
        default: openwrt-25.12
      name:
        description: 'Firmware Name'
        required: false
        default: ImmortalWrt
      feeds_conf:
        description: 'Custom feeds file'
        required: false
        default: 'feeds.conf.default'
      config:
        description: 'Custom build config'
        required: false
        default: '.config'
      kernel_config:
        description: 'Custom kernel build config'
        required: false
        default: 'config-6.12'
      artifact:
        description: 'Upload firmware to artifact'
        required: false
        default: true
        type: boolean
      release:
        description: 'Upload firmware to release'
        required: false
        default: false
        type: boolean
      bindir:
        description: 'Upload bin to artifact'
        required: false
        default: false
        type: boolean

env:
  BEFORE_FEED_SH: before-installing-feed.sh
  AFTER_FEED_SH: after-installing-feed.sh
  TZ: UTC

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Set default inputs
      env:
        INPUT_SSH: ${{ inputs.ssh }}
        INPUT_NOCACHE: ${{ inputs.nocache }}
        INPUT_REPO: ${{ inputs.repo }}
        INPUT_BRANCH: ${{ inputs.branch }}
        INPUT_NAME: ${{ inputs.name }}
        INPUT_FEEDS_CONF: ${{ inputs.feeds_conf }}
        INPUT_CONFIG: ${{ inputs.config }}
        INPUT_KERNEL_CONFIG: ${{ inputs.kernel_config }}
        INPUT_ARTIFACT: ${{ inputs.artifact }}
        INPUT_RELEASE: ${{ inputs.release }}
        INPUT_BINDIR: ${{ inputs.bindir }}
        PAYLOAD_SSH: ${{ github.event.client_payload.ssh }}
        PAYLOAD_NOCACHE: ${{ github.event.client_payload.nocache }}
        PAYLOAD_REPO: ${{ github.event.client_payload.repo }}
        PAYLOAD_BRANCH: ${{ github.event.client_payload.branch }}
        PAYLOAD_NAME: ${{ github.event.client_payload.name }}
        PAYLOAD_FEEDS_CONF: ${{ github.event.client_payload.feeds_conf }}
        PAYLOAD_CONFIG: ${{ github.event.client_payload.config }}
        PAYLOAD_KERNEL_CONFIG: ${{ github.event.client_payload.kernel_config }}
        PAYLOAD_ARTIFACT: ${{ github.event.client_payload.artifact }}
        PAYLOAD_RELEASE: ${{ github.event.client_payload.release }}
        PAYLOAD_BINDIR: ${{ github.event.client_payload.bindir }}
      run: |
        {
          echo "SSH=${PAYLOAD_SSH:-${INPUT_SSH:-false}}"
          echo "NOCACHE=${PAYLOAD_NOCACHE:-${INPUT_NOCACHE:-false}}"
          echo "REPO_URL=${PAYLOAD_REPO:-${INPUT_REPO:-https://github.com/immortalwrt/immortalwrt}}"
          echo "REPO_BRANCH=${PAYLOAD_BRANCH:-${INPUT_BRANCH:-openwrt-25.12}}"
          echo "FIRMWARE_NAME=${PAYLOAD_NAME:-${INPUT_NAME:-ImmortalWrt}}"
          echo "FEEDS_CONF=${PAYLOAD_FEEDS_CONF:-${INPUT_FEEDS_CONF:-feeds.conf.default}}"
          echo "BUILD_CONFIG=${PAYLOAD_CONFIG:-${INPUT_CONFIG:-.config}}"
          echo "KERNEL_CONFIG=${PAYLOAD_KERNEL_CONFIG:-${INPUT_KERNEL_CONFIG:-config-6.12}}"
          echo "ARTIFACT=${PAYLOAD_ARTIFACT:-${INPUT_ARTIFACT:-true}}"
          echo "RELEASE=${PAYLOAD_RELEASE:-${INPUT_RELEASE:-false}}"
          echo "BINDIR=${PAYLOAD_BINDIR:-${INPUT_BINDIR:-false}}"
        } >> $GITHUB_ENV

    - name: Free up disk space
      uses: jlumbroso/free-disk-space@main
      with:
        tool-cache: false
        android: true
        dotnet: true
        haskell: true
        large-packages: true
        docker-images: true
        swap-storage: true

    - name: Initialization environment
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo ln -snf /usr/share/zoneinfo/$TZ /etc/localtime
        sudo apt update
        sudo apt -y install erofs-utils tmux gawk qemu-utils
        sudo apt-mark hold apache2 apache2-bin apache2-data apache2-utils azure-cli curl distro-info-data docker-ce-cli dpkg-dev dpkg gh  gir1.2-packagekitglib-1.0 git git-man iproute2 kmod kubectl libavahi-client3 libavahi-common-data libavahi-common3 libcap2 libcap2-bin libcurl3t64-gnutls libcurl4t64 libdpkg-perl libnghttp2-14 libpng16-16t64 libkmod2 liblcms2-2 libntfs-3g89t64 libpackagekit-glib2-18 libpam-cap libpolkit-agent-1-0 libpolkit-gobject-1-0 linux-azure linux-cloud-tools-azure linux-cloud-tools-common linux-headers-azure linux-image-azure linux-tools-azure linux-tools-common nginx nginx-common ntfs-3g open-vm-tools openssh-client openssh-server openssh-sftp-server packagekit packagekit-tools powershell rsyslog snapd ssh ubuntu-pro-client ubuntu-pro-client-l10n vim vim-common vim-runtime vim-tiny xxd
        sudo bash -c 'bash <(curl -s https://build-scripts.immortalwrt.org/init_build_environment.sh)'
        sudo apt -y autoremove golang-* --purge
        sudo rm -rf /usr/bin/go /usr/bin/gofmt /usr/lib/go-* /usr/lib/go-[0-9]*
        sudo mkdir -p /workdir
        sudo chown -R $(whoami):$(whoami) /workdir

    - name: Setup go
      uses: actions/setup-go@main
      with:
        go-version: 'stable'
        cache: false

    - name: Free up disk space again
      uses: jlumbroso/free-disk-space@main
      with:
        tool-cache: true
        android: false
        dotnet: false
        haskell: false
        large-packages: false
        docker-images: false
        swap-storage: false

    - name: Checkout
      uses: actions/checkout@main

    - name: Clone source code
      working-directory: /workdir
      run: |
        df -hT $PWD
        git clone --depth=1 "$REPO_URL" -b "$REPO_BRANCH" openwrt
        ln -sf /workdir/openwrt $GITHUB_WORKSPACE/openwrt

    - name: Free up disk space again again
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo mkdir -p -m 777 /mnt/openwrt/dl /mnt/openwrt/staging_dir /mnt/openwrt/build_dir
        rm -rf openwrt/dl openwrt/staging_dir openwrt/build_dir
        ln -sf /mnt/openwrt/dl openwrt/dl
        ln -sf /mnt/openwrt/staging_dir openwrt/staging_dir
        ln -sf /mnt/openwrt/build_dir openwrt/build_dir

    - name: Cache
      uses: stupidloud/cachewrtbuild@main
      with:
        ccache: 'true'
        prefix: ${{ github.workspace }}/openwrt
        clean: '${{ env.NOCACHE }}'
        mixkey: x86-64

    - name: Load custom feeds
      run: |
        [ -e "$FEEDS_CONF" ] && mv "$FEEDS_CONF" openwrt/feeds.conf.default
        chmod +x $BEFORE_FEED_SH
        cd openwrt
        $GITHUB_WORKSPACE/$BEFORE_FEED_SH

    - name: Update feeds
      run: cd openwrt && ./scripts/feeds update -a

    - name: Install feeds
      run: cd openwrt && ./scripts/feeds install -a -f

    - name: Load custom configuration
      run: |
        [ -e files ] && mv files openwrt/files
        [ -e "$BUILD_CONFIG" ] && mv "$BUILD_CONFIG" openwrt/.config
        [ -e "$KERNEL_CONFIG" ] && mv "$KERNEL_CONFIG" "openwrt/target/linux/x86/$KERNEL_CONFIG"
        chmod +x $AFTER_FEED_SH
        cd openwrt
        $GITHUB_WORKSPACE/$AFTER_FEED_SH
        cat package/emortal/default-settings/files/99-default-settings

    - name: Set variables
      run: |
        echo "BUILD_TIME=$(date +"%Y%m%d%H%M")" >> $GITHUB_ENV
        echo "BUILD_NUMBER=$(git rev-parse --short HEAD)" >> $GITHUB_ENV
        cd openwrt
        grep '^CONFIG_TARGET.*DEVICE.*=y' .config | sed -r 's/.*DEVICE_(.*)=y/\1/' > DEVICE_NAME
        [ -s DEVICE_NAME ] && echo "DEVICE_NAME=$(cat DEVICE_NAME)" >> $GITHUB_ENV

    - name: Make Easy Update Script happy
      run: |
        sed -i "/exit 0/i\sed -i '/DISTRIB_GITHUB/d' /etc/openwrt_release" openwrt/package/emortal/default-settings/files/99-default-settings
        sed -i "/DISTRIB_GITHUB/a\echo \"DISTRIB_GITHUB=\'https://github.com/${{github.repository}}\'\" >> /etc/openwrt_release" openwrt/package/emortal/default-settings/files/99-default-settings
        sed -i "/exit 0/i\sed -i '/DISTRIB_VERSIONS/d' /etc/openwrt_release" openwrt/package/emortal/default-settings/files/99-default-settings
        sed -i "/DISTRIB_VERSIONS/a\echo \"DISTRIB_VERSIONS=\'${{ env.BUILD_TIME }}_${{ env.BUILD_NUMBER }}\'\" >> /etc/openwrt_release" openwrt/package/emortal/default-settings/files/99-default-settings
        sudo chmod +x openwrt/files/usr/bin/easyupdate.sh

    - name: SSH connection to Actions
      uses: owenthereal/action-upterm@main
      if: env.SSH == 'true'
      with:
        wait-timeout-minutes: 15

    - name: Download package
      id: package
      run: |
        cd openwrt
        make defconfig
        make download -j8
        find dl -size -1024c -exec ls -l {} \;
        find dl -size -1024c -exec rm -f {} \;

    - name: Compile the firmware
      id: compile
      run: |
        cd openwrt
        echo -e "$(nproc) thread compile"
        make -j$(nproc) || make -j1 || make -j1 V=s
        echo "status=success" >> $GITHUB_OUTPUT

    - name: Check space usage
      if: (!cancelled())
      run: df -hT

    - name: Upload bin directory
      uses: actions/upload-artifact@main
      if: steps.compile.outputs.status == 'success' && env.BINDIR == 'true' && !cancelled()
      with:
        name: ${{ env.FIRMWARE_NAME }}_bin_${{ env.DEVICE_NAME }}_${{ env.BUILD_TIME }}_${{ env.BUILD_NUMBER }}
        path: openwrt/bin

    - name: Get environment path
      id: environment
      if: env.BINDIR == 'true' && !cancelled()
      run: |
        cd openwrt/bin/
        echo "WORKSPACE_DIR=$PWD" >> $GITHUB_ENV
        cd  targets/*/*
        echo "UPLOAD_PATH=$PWD" >> $GITHUB_ENV
        echo "status=success" >> $GITHUB_OUTPUT

    - name: Compressed kernel packages
      uses: thedoctor0/zip-release@master
      if: steps.environment.outputs.status == 'success' && steps.compile.outputs.status == 'success' && !cancelled()
      with:
        type: tar
        path: packages/
        directory: ${{ env.UPLOAD_PATH }}/
        filename: ${{ env.UPLOAD_PATH }}/${{ env.FIRMWARE_NAME }}_firmware_kernel_packages_${{ env.DEVICE_NAME }}_${{ env.BUILD_TIME }}_${{ env.BUILD_NUMBER }}.tar.gz

    - name: Compressed firmware packages
      uses: thedoctor0/zip-release@master
      if: steps.environment.outputs.status == 'success' && steps.compile.outputs.status == 'success' && !cancelled()
      with:
        type: tar
        path: packages/
        directory: ${{ env.WORKSPACE_DIR }}/
        filename: ${{ env.UPLOAD_PATH }}/${{ env.FIRMWARE_NAME }}_firmware_packages_${{ env.DEVICE_NAME }}_${{ env.BUILD_TIME }}_${{ env.BUILD_NUMBER }}.tar.gz

    - name: Organize files
      id: organize
      if: env.ARTIFACT == 'true' && steps.compile.outputs.status == 'success' && !cancelled()
      run: |
        cd openwrt/bin/targets/*/*
        rm -rf packages
        echo "FIRMWARE=$PWD" >> $GITHUB_ENV
        echo "status=success" >> $GITHUB_OUTPUT

    - name: Upload firmware directory to artifact
      uses: actions/upload-artifact@main
      if: steps.organize.outputs.status == 'success' && !cancelled()
      with:
        name: ${{ env.FIRMWARE_NAME }}_firmware_${{ env.DEVICE_NAME }}_${{ env.BUILD_TIME }}_${{ env.BUILD_NUMBER }}
        path: ${{ env.FIRMWARE }}

    - name: Upload firmware to release
      uses: softprops/action-gh-release@v2
      if: env.RELEASE == 'true' && steps.compile.outputs.status == 'success' && !cancelled()
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        files: ${{ env.FIRMWARE }}/*
        name: ${{ env.FIRMWARE_NAME }} ${{ env.DEVICE_NAME }}
        tag_name: ${{ env.FIRMWARE_NAME }}_${{ env.DEVICE_NAME }}_${{ env.BUILD_TIME }}_${{ env.BUILD_NUMBER }}
